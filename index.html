<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Privacy Policies</title>
    <style>
      :root {
        --bg: #f3efe4;
        --ink: #1d2a34;
        --card: #fffdfa;
        --line: #d4c8b0;
        --accent: #c56f34;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: Georgia, "Times New Roman", serif;
        color: var(--ink);
        background: var(--bg);
      }
      main {
        max-width: 760px;
        margin: 48px auto;
        padding: 0 20px;
      }
      .card {
        background: var(--card);
        border: 1px solid var(--line);
        border-radius: 16px;
        padding: 24px;
      }
      h1 { margin-top: 0; }
      a { color: var(--accent); }
    </style>
  </head>
  <body>
    <main>
      <section class="card">
        <h1>Privacy Policies</h1>
        <p>Select an app policy:</p>
        <ul>
          <li><a href="./plnk/">PLNK</a></li>
          <li><a href="./field-guide/">Field Guide: Pokopia Companion</a></li>
        </ul>
      </section>
    </main>
  </body>
</html>
